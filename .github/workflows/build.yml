name: build-trmnl-data

# Baut output payload aus den Live-openfootball-Daten und veröffentlicht ihn
# als GitHub-Pages-Datei. TRMNL pollt dann:
#   https://do4two.github.io/TRMNL_FIFA_KO/trmnl_data.json

on:
  schedule:
    - cron: "*/30 * * * *"   # alle 30 Minuten
  workflow_dispatch:          # manuell auslösbar
  push:
    branches: [main]          # bei jedem Push auf main

# Pages-Deploy braucht diese Rechte
permissions:
  contents: read
  pages: write
  id-token: write

# Nie zwei Deploys gleichzeitig; laufende abbrechen
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Build payload -> _site/trmnl_data.json
        run: python src/build_data.py --out _site/trmnl_data.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
